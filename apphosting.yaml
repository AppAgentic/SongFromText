# Firebase App Hosting config for SongFromText.
#
# Server-only secrets (secret: refs below) are stored in Google Secret Manager
# and automatically synced into the runtime. Add them via:
#   firebase apphosting:secrets:set <SECRET_NAME>
#
# NEXT_PUBLIC_* values are plain env entries (safe to expose to the browser).

runConfig:
  minInstances: 0
  maxInstances: 10

env:
  # --- Public (exposed to client) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_POSTHOG_KEY
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_POSTHOG_HOST
    value: "https://eu.i.posthog.com"
    availability:
      - BUILD
      - RUNTIME

  # --- Server-only secrets (Secret Manager) ---
  - variable: WHOP_API_KEY
    secret: WHOP_API_KEY
  - variable: WHOP_WEBHOOK_SECRET
    secret: WHOP_WEBHOOK_SECRET
  - variable: WHOP_COMPANY_ID
    secret: WHOP_COMPANY_ID
  - variable: WHOP_PLAN_ID_WEEKLY
    secret: WHOP_PLAN_ID_WEEKLY
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
  - variable: KIE_API_KEY
    secret: KIE_API_KEY
