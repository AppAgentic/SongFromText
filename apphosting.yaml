# Firebase App Hosting config for SongFromText.
#
# Server-only secrets (secret: refs below) are stored in Google Secret Manager
# and automatically synced into the runtime. Add them via:
#   firebase apphosting:secrets:set <SECRET_NAME>
#
# NEXT_PUBLIC_* values are plain env entries (safe to expose to the browser).

runConfig:
  minInstances: 0
  maxInstances: 10

env:
  # --- Public (exposed to client) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyBtnJcEXJmuqB971C0H4K7hUxlw22ICDaI"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "songfromtext-app.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "songfromtext-app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "songfromtext-app.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "872851323679"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:872851323679:web:1e5f2cc35d42e917a8ce2a"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_POSTHOG_KEY
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_POSTHOG_HOST
    value: "https://eu.i.posthog.com"
    availability:
      - BUILD
      - RUNTIME

  # --- Server-only runtime config and secrets ---
  - variable: FIREBASE_PROJECT_ID
    value: "songfromtext-app"
  - variable: WHOP_API_KEY
    secret: WHOP_API_KEY
  - variable: WHOP_WEBHOOK_SECRET
    secret: WHOP_WEBHOOK_SECRET
  - variable: WHOP_COMPANY_ID
    secret: WHOP_COMPANY_ID
  - variable: SONG_WEEKLY_PRICE_GBP
    value: "6.99"

  # Firebase Admin uses App Hosting's application default credentials.
  # Add KIE_API_KEY here after the real Kie.ai key is created in Secret Manager.
